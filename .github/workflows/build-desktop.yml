name: Build Desktop App

on:
  push:
    branches: [main, dev, feat-json-data-intgeration]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build
        env:
          CI: false

      - name: Build Tauri app
        run: npm run tauri build
        env:
          CI: false

      - name: Package Portable ZIP
        shell: pwsh
        run: |
          $releaseDir = "src-tauri/target/release"
          $outDir = "portable/BCM-Operate-Portable"
          New-Item -ItemType Directory -Force -Path $outDir

          # Grab the main Tauri EXE (largest .exe in release dir)
          $mainExe = Get-ChildItem "$releaseDir/*.exe" |
            Sort-Object Length -Descending | Select-Object -First 1

          Copy-Item $mainExe.FullName "$outDir/BCM Operate.exe"

          # Zip it
          Compress-Archive -Path "$outDir/*" -DestinationPath "portable/BCM-Operate-Portable.zip" -Force

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: build-${{ github.run_number }}
          name: App Build ${{ github.run_number }}
          draft: false
          prerelease: false
          files: |
            portable/BCM-Operate-Portable.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build
        env:
          CI: false

      - name: Build Tauri app
        run: npm run tauri build
        env:
          CI: false

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: build-${{ github.run_number }}
          name: App Build ${{ github.run_number }}
          draft: false
          prerelease: false
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
